{% load static %}

<!DOCTYPE html>
<html>
    <head>
        
        <title>{{recipe.title}} | Cravely</title>
        <link rel = "stylesheet" href = "{% static 'recipepage.css' %}">
        

    </head>

    <body>
        {% comment %} {% include 'header.html' %} {% endcomment %}
        <div class="recipe-title-section">

            <div class="recipe-tags-container">
                {% for tag in recipe.tags.all %}
                    <span class="recipe-tag">
                        {{ tag.name }}
                    </span>
                {% empty %}
                    <span> 
                        No tags for this recipe 
                    </span>
                {% endfor %}

            </div>



        </div>
        
            


    </body>

</html>
